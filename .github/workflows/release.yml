name: Release
on:
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: oneshot
          POSTGRES_PASSWORD: oneshot
          POSTGRES_DB: oneshot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U oneshot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      H4CKATH0N_DATABASE_URL: postgresql+asyncpg://oneshot:oneshot@localhost:5432/oneshot_test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Run backend tests
        working-directory: api
        run: |
          uv sync
          uv run pytest
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Run frontend tests
        working-directory: web
        run: |
          npm ci
          npm run test

  build-and-publish:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Package frontend artifact
        run: ./scripts/ci/package_frontend.sh
      - name: Upload Frontend Tarball to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.event.release.tag_name }} frontend.tar.xz
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build and push Backend API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/oneshot-api
      - name: Build and push Frontend Caddy image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./web/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/oneshot-web
